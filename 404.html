<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="refresh" content="0; url=/dashboard/" />
    <script>
      // GitHub Pages SPA redirect
      // If a user visits a deep link, redirect to index.html and let the SPA router handle it
      (function() {
        var l = window.location;
        var pathname = l.pathname.replace(/^\/dashboard/, "");
        if (pathname && pathname !== "/" && pathname !== "/404.html") {
          var newUrl = "/dashboard/?redirect=" + encodeURIComponent(pathname + l.search + l.hash);
          window.location.replace(newUrl);
        }
      })();
    </script>
    <title>404 Not Found</title>
  </head>
  <body>
    <h1>404 Not Found</h1>
    <p>Redirecting...</p>
  </body>
</html>
